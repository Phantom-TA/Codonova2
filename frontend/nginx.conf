server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS — re-resolves dynamically, prevents 502 after restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxy to backend
    # NOTE: using $backend_host variable forces DNS re-resolution.
    # With a variable, nginx does NOT strip location prefix, so proxy_pass
    # must NOT include the /api/ path — the full URI is forwarded as-is.
    location /api/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
    }

    # WebSocket proxy
    location /ws/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
